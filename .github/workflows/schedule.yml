name: Auto Investment Research System

# ============================================================
#  定时任务配置
#  时区说明：GitHub cron 使用 UTC 时间，北京时间 = UTC + 8
# ============================================================

on:
  schedule:
    # ---- 盘前分析 ----
    # 北京 8:45 = UTC 0:45，每个交易日（周一至周五）
    - cron: '45 0 * * 1-5'
    # ---- 盘中监控（上午） ----
    # 北京 10:30 = UTC 2:30
    - cron: '30 2 * * 1-5'
    # ---- 盘中监控（下午） ----
    # 北京 13:30 = UTC 5:30
    - cron: '30 5 * * 1-5'
    # 北京 14:30 = UTC 6:30
    - cron: '30 6 * * 1-5'
    # ---- 盘后日报 ----
    # 北京 15:35 = UTC 7:35
    - cron: '35 7 * * 1-5'
    # ---- 夜间更新 ----
    # 北京 20:00 = UTC 12:00
    - cron: '0 12 * * 1-5'

  # 手动触发（用于测试）
  workflow_dispatch:

jobs:
  run_system:
    runs-on: ubuntu-latest
    # 超时保护：单次运行最多 30 分钟
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行主程序
      - name: Run investment research system
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          RUN_MODE: ${{ secrets.RUN_MODE }}
        run: python main.py

      # 5. 上传报告和日志（保留 30 天）
      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: |
            data/
            logs/
          retention-days: 30
