jobs:
  run_system:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5        # 改这里

      - name: Set up Python
        uses: actions/setup-python@v5    # 改这里
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run investment research system
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          RUN_MODE: ${{ secrets.RUN_MODE }}
        run: python main.py

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4  # 改这里
        with:
          name: reports-${{ github.run_number }}
          path: |
            data/
            logs/
          retention-days: 30
