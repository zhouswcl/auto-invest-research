name: Auto Investment Research System

on:
  workflow_dispatch:  # 允许手动触发
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨0点运行（可修改）

jobs:
  run_system:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5  # 最新版本，支持 Node.js 24

      - name: Set up Python
        uses: actions/setup-python@v5  # 最新版本，支持 Node.js 24
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: |
          mkdir -p data/  # 创建报告输出目录
          mkdir -p logs/  # 创建日志目录

      - name: Run investment research system
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          RUN_MODE: ${{ secrets.RUN_MODE }}
        run: python main.py

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4  # 最新版本，支持 Node.js 24
        with:
          name: reports-${{ github.run_number }}
          path: |
            data/
            logs/
          retention-days: 30
